<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

/* HEADER */
header{
background:#2563eb;
color:white;
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* VIDEO */
.video{padding:15px}

/* GRID */
.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.hot{
position:absolute;
top:10px;
left:10px;
background:#ff3b3b;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.content{padding:10px}

.title{font-weight:bold}

.price{color:#2563eb;font-weight:bold}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
margin-left:5px;
}

/* ⭐ Rating */
.rating{
font-size:12px;
margin-top:5px;
color:#f59e0b;
}

/* 📋 FEATURES */
.features{
font-size:12px;
color:#555;
margin-top:5px;
padding-left:15px;
}

.features li{margin-bottom:3px}

/* STATUS */
.status{
display:flex;
justify-content:space-between;
margin-top:5px;
font-size:12px;
}

.stock{
background:#dcfce7;
color:#15803d;
padding:3px 8px;
border-radius:10px;
}

.instant{color:#f59e0b}

/* BUTTON */
.btn{
margin-top:10px;
display:block;
background:#2563eb;
color:white;
text-align:center;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{background:#1d4ed8}

/* REVIEW */
.review{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* CONTACT */
.contact{
position:fixed;
bottom:20px;
right:20px;
background:#2563eb;
color:white;
padding:12px;
border-radius:50%;
font-size:20px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
width:300px;
}

/* INPUT MODERN */
input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* FILE STYLE */
.file-label{
display:block;
background:#f3f4f6;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.file-label input{display:none}

/* SUBMIT */
.submit-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
margin-top:10px;
cursor:pointer;
}

.submit-btn:hover{background:#1d4ed8}

</style>
</head>

<body>

<header>🚀 Kevin Bot EA Store</header>

<div class="video">
<h3>🎥 How To Use Bot</h3>
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/VIDEO_ID"
frameborder="0" allowfullscreen
style="border-radius:10px;"></iframe>
</div>

<div class="container">

<!-- CARD -->
<div class="card">
<div class="hot">HOT</div>
<img src="vip.jpg.png">
<div class="content">
<div class="title">Kevin Bot EA VIP</div>
<div class="price">$35 <span class="old">$50</span></div>

<div class="rating">⭐⭐⭐⭐⭐ (120 reviews)</div>

<ul class="features">
<li>📈 Winrate 80%+</li>
<li>⚡ Fast Scalping</li>
<li>🤖 Auto Trade</li>
<li>🛡️ Safe SL/TP</li>
</ul>

<div class="status">
<span class="stock">✔ In Stock</span>
<span class="instant">⚡ Instant</span>
</div>

<div onclick="buy(35)" class="btn">Buy Now</div>
</div>
</div>

</div>

<!-- REVIEW -->
<div class="review">
<h3>⭐ User Reviews</h3>
<p>⭐⭐⭐⭐⭐ Profit daily 💰</p>
<p>⭐⭐⭐⭐⭐ Easy & stable 📊</p>
</div>

<a href="https://t.me/kevinofficialbotea" class="contact">💬</a>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">

<h2 id="priceText">💰 Pay $35</h2>

<img src="qr.png.jpeg" width="200">

<p>Scan & Pay ABA</p>

<input type="text" id="username" placeholder="@telegram username">

<label class="file-label">
📎 Upload Payment Screenshot
<input type="file" id="file">
</label>

<button onclick="confirmPay()" class="submit-btn">Submit Payment</button>

<button onclick="closePopup()">Close</button>

</div>
</div>

<script>
let currentPrice = 35;

function buy(price){
currentPrice = price;
document.getElementById("priceText").innerText = "💰 Pay $" + price;
document.getElementById("popup").style.display = "flex";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

async function confirmPay(){

let file = document.getElementById("file").files[0];
let username = document.getElementById("username").value;

if(!file){alert("Upload receipt");return;}
if(!username){alert("Enter username");return;}

let BOT_TOKEN = "8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
let CHAT_ID = "8451417510";

let formData = new FormData();
formData.append("chat_id", CHAT_ID);
formData.append("photo", file);
formData.append("caption","💰 Payment $" + currentPrice + "\nUser: " + username);

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
method:"POST",
body:formData
});

alert("✅ Sent!");
closePopup();
}
</script>

</body>
</html>
