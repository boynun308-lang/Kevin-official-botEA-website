<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA Store</title>

  <style>
    body {
      background: #ffffff;
      font-family: Arial;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #007bff;
      color: white;
    }

    .cart {
      background: white;
      color: #007bff;
      padding: 5px 10px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      margin: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #007bff;
      font-size: 18px;
      margin: 5px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .checkout {
      background: #f0f0f0;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    .total {
      font-size: 20px;
      margin: 10px 0;
      color: #007bff;
    }

    .pay {
      background: red;
    }

    .telegram {
      background: #0088cc;
    }

    /* QR Popup */
    #qrPopup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .popup img {
      width: 200px;
    }

  </style>
</head>

<body>

<header>
  <div>🚀 Kevin Store</div>
  <div class="cart">🛒 $<span id="total">0</span></div>
</header>

<h1>Kevin Bot EA Products</h1>

<div class="grid">

  <div class="card">
  <img src="IMG_0281.jpeg">

  <h3>KEVIN BOT EA VIP</h3>
  <div class="price">$50</div>

  <a href="KEVIN%20BOT%20EA%20VIP.mq5" download>
    <button>⬇️ Download EA</button>
  </a>
</div>

  <div class="card">
    <img src="IMG_0281.jpeg">
    <h3>EA XAUUSD Pro</h3>
    <div class="price">$100</div>
    <button onclick="add('EA XAUUSD',100)">Add to Cart</button>
  </div>

</div>

<!-- CHECKOUT -->
<div class="checkout">
  <h3>Total Amount</h3>
  <div class="total">$<span id="sum">0</span></div>

  <button class="pay" onclick="pay()">💰 Pay with KHQR</button>

  <button class="telegram" onclick="telegram()">📩 Send Telegram</button>
</div>

<!-- QR POPUP -->
<div id="qrPopup">
  <div class="popup">
    <h2>Scan ABA to Pay</h2>
    <img src="IMG_0281.jpeg">
    <br><br>
    <button onclick="closeQR()">Close</button>
  </div>
</div>

<script>
let total = 0;
let items = [];

function add(name, price){
  total += price;
  items.push(name + " $" + price);

  document.getElementById("total").innerText = total;
  document.getElementById("sum").innerText = total;
}

function pay(){
  if(total == 0){
    alert("No item selected!");
  }else{
    document.getElementById("qrPopup").style.display = "flex";
  }
}

function closeQR(){
  document.getElementById("qrPopup").style.display = "none";
}

function telegram(){
  if(total == 0){
    alert("No order!");
    return;
  }

  let text = "Order:\n" + items.join("\n") + "\nTotal: $" + total;

  let url = "https://t.me/kevinofficialboteatext=" + encodeURIComponent(text);

  window.open(url, "_blank");
}
</script>

</body>
</html>
