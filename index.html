<!DOCTYPE html>
<html>
<head>
  <title>Kevin Official Bot EA</title>

  <style>
    body {
      background: #0b0b0b;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    h1 {
      color: gold;
      margin-top: 30px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1a1a1a;
      width: 250px;
      border-radius: 10px;
      padding: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: gold;
      font-size: 20px;
      margin: 10px 0;
    }

    .btn {
      background: gold;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }

    .btn:hover {
      background: orange;
    }

  </style>
</head>

<body>

<h1>🚀 Kevin Bot EA Store</h1>

<div class="container">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="IMG_0281.jpeg">
    <h3>EA Gold Scalping</h3>
    <div class="price">$50</div>
   <button class="btn" onclick="window.open('https://https://t.me/kevinofficialbotea?text=I want to buy EA Gold Scalping $50')">
  Buy Now
</button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="IMG_0281.jpeg">
    <h3>EA XAUUSD Pro</h3>
    <div class="price">$100</div>
    <button class="btn" onclick="alert('Scan ABA to pay')">Buy Now</button>
  </div>

</div>

<div id="qrPopup" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
">
  <div style="background:#111; padding:20px; border-radius:10px; text-align:center;">
    <h2 style="color:gold;">Scan ABA to Pay</h2>
    <img src="IMG_0281.jpeg" style="width:200px; margin:10px 0;">
    <br>
    <button onclick="closeQR()" style="
      padding:10px 20px;
      background:red;
      color:white;
      border:none;
      border-radius:5px;
    ">Close</button>
  </div>
</div>
</body>
</html>
