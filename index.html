<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA Store</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
}

header{
  background:#2563eb;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.title{
  font-weight:bold;
  font-size:16px;
}

.price{
  color:#2563eb;
  font-size:18px;
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  color:gray;
  margin-left:5px;
}

.badge{
  display:inline-block;
  background:#dcfce7;
  color:#15803d;
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
  margin-top:5px;
}

.btn{
  margin-top:10px;
  display:block;
  background:#2563eb;
  color:white;
  text-align:center;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>🚀 Kevin Bot EA Store</header>

<div class="container">

<!-- VIP -->
<div class="card">
  <img src="vip.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA VIP</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" class="btn">Buy Now</a>
  </div>
</div>

<!-- Scalping -->
<div class="card">
  <img src="scalping.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA Pro Scalping</div>
    <div class="price">$45 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" class="btn">Buy Now</a>
  </div>
</div>

<!-- Auto -->
<div class="card">
  <img src="auto.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot Trading Auto VIP</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" class="btn">Buy Now</a>
  </div>
</div>

<!-- Official -->
<div class="card">
  <img src="official.jpg.png">
  <div class="content">
    <div class="title">Kevin Official Bot EA</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" class="btn">Buy Now</a>
  </div>
</div>

</div>

</body>
</html>
