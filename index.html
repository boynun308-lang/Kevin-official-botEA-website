<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA Store</title>

  <style>
    body {
      background: #ffffff;
      font-family: Arial;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin: 20px;
      color: #222;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      position: relative;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
    }

    .price {
      color: #007bff;
      font-size: 18px;
      margin: 5px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 16px;
    }

    .hot {
      position: absolute;
      top: 10px;
      left: 10px;
      background: red;
      color: white;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    /* QR Popup */
    #qrPopup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .popup-box img {
      width: 200px;
      margin: 10px 0;
    }

    .close-btn {
      background: red;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🚀 Kevin Bot EA Store</h1>

<div class="grid">

  <!-- PRODUCT 1 -->
  <div class="card">
    <span class="hot">HOT</span>
    <img src="IMG_0281.jpeg">
    <div class="title">EA Gold Scalping</div>
    <div class="price">$50</div>
    <button onclick="openQR()">Buy Now</button>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <span class="hot">HOT</span>
    <img src="IMG_0281.jpeg">
    <div class="title">EA XAUUSD Pro</div>
    <div class="price">$100</div>
    <button onclick="openQR()">Buy Now</button>
  </div>

</div>

<!-- QR POPUP -->
<div id="qrPopup">
  <div class="popup-box">
    <h2>Scan ABA to Pay</h2>
    <img src="IMG_0281.jpeg">
    <br>
    <button class="close-btn" onclick="closeQR()">Close</button>
  </div>
</div>

<script>
function openQR() {
  document.getElementById("qrPopup").style.display = "flex";
}
function closeQR() {
  document.getElementById("qrPopup").style.display = "none";
}
</script>

</body>
</html>
