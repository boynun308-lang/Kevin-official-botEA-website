<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA Store</title>

  <style>
    body {
      background:white;
      font-family:Arial;
      text-align:center;
    }

    .card {
      background:#f5f5f5;
      margin:20px;
      padding:20px;
      border-radius:10px;
    }

    button {
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      margin-top:10px;
    }

    #popup {
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<h1>🚀 Kevin Bot EA</h1>

<div class="card">
  <h3>KEVIN BOT EA VIP</h3>
  <h2>$50</h2>

  <button onclick="buy()">Buy Now</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="box">

    <h2>Scan ABA</h2>
    <img src="IMG_0281.jpeg" width="200">

    <p>Upload payment receipt</p>

    <input type="file" id="file">

    <br><br>

    <button onclick="unlock()">OK</button>

    <br><br>

    <a id="download" href="KEVIN%20BOT%20EA%20VIP.mq5" download style="display:none;">
      <button>⬇️ Download Bot</button>
    </a>

  </div>
</div>

<script>

function buy(){
  document.getElementById("popup").style.display="flex";
}

function unlock(){
  let file = document.getElementById("file").files[0];

  if(!file){
    alert("Please upload receipt!");
    return;
  }

  // 👉 unlock download
  document.getElementById("download").style.display="block";
}

</script>

</body>
</html>
