<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Premium Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb}

/* LOGIN */
#login{
display:flex;height:100vh;justify-content:center;align-items:center;
}
.box{
background:white;padding:25px;border-radius:15px;text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
input{
width:90%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;
}
button{
padding:10px;margin-top:10px;width:95%;background:#2563eb;color:white;border:none;border-radius:10px;
}

/* HEADER */
header{
display:flex;justify-content:space-between;padding:15px;background:white;
}

/* GRID */
.container{
display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px;
}

/* CARD */
.card{
background:white;border-radius:18px;overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);position:relative;
}
.hot{
position:absolute;top:10px;left:10px;background:red;color:white;
padding:5px 10px;border-radius:10px;font-size:12px;
}
.card img{width:100%;height:130px;object-fit:cover}
.content{padding:10px}
.title{font-weight:bold}
.price{color:#2563eb;font-weight:bold}
.old{text-decoration:line-through;color:gray;font-size:12px}
.btn{
display:block;background:#2563eb;color:white;text-align:center;
padding:10px;border-radius:10px;margin-top:10px;
}

/* POPUP */
#popup{
display:none;position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.6);justify-content:center;align-items:center;
}
.popup{
background:white;padding:20px;border-radius:15px;text-align:center;
}

/* HISTORY */
#history{display:none;padding:15px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🔐 Login</h2>
<input id="email" placeholder="Gmail">
<button onclick="login()">Enter</button>
</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<header>
<div>🚀 Kevin Store</div>
<div onclick="showHistory()">📦 Orders</div>
</header>

<!-- STORE -->
<div id="store" class="container">

<div class="card">
<div class="hot">HOT</div>
<img src="vip.jpg.png">
<div class="content">
<div class="title">Kevin Bot EA VIP</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'VIP Bot')">Buy</div>
</div>
</div>

<div class="card">
<div class="hot">HOT</div>
<img src="scalping.jpg.png">
<div class="content">
<div class="title">Kevin Bot Scalping</div>
<div class="price">$45 <span class="old">$60</span></div>
<div class="btn" onclick="buy(45,'Scalping')">Buy</div>
</div>
</div>

<div class="card">
<div class="hot">HOT</div>
<img src="auto.jpg.png">
<div class="content">
<div class="title">Auto Trading VIP</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'Auto VIP')">Buy</div>
</div>
</div>

<div class="card">
<div class="hot">HOT</div>
<img src="official.jpg.png">
<div class="content">
<div class="title">Kevin Official EA</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'Official')">Buy</div>
</div>
</div>

</div>

<!-- HISTORY -->
<div id="history"></div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup">

<h3 id="priceText"></h3>

<img src="qr.png.jpeg" width="200">

<input id="username" placeholder="Telegram username">
<input type="file" id="file">

<br><br>

<button onclick="confirmPay()">Submit</button>
<button onclick="closePopup()">Close</button>

</div>
</div>

<script>

let price=0;
let product="";

// LOGIN
function login(){
let email=document.getElementById("email").value;
if(!email){alert("Enter email");return;}
localStorage.setItem("user",email);
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}

// BUY
function buy(p,name){
price=p;
product=name;
document.getElementById("priceText").innerText=name+" - $"+p;
document.getElementById("popup").style.display="flex";
}

// CLOSE
function closePopup(){
document.getElementById("popup").style.display="none";
}

// HISTORY
function showHistory(){
let data=JSON.parse(localStorage.getItem("orders")||"[]");
let html="<h3>Your Orders</h3>";
data.forEach(x=>{
html+="<p>"+x+"</p>";
});
document.getElementById("history").innerHTML=html;
document.getElementById("store").style.display="none";
document.getElementById("history").style.display="block";
}

// PAYMENT
async function confirmPay(){

let file=document.getElementById("file").files[0];
let user=document.getElementById("username").value;

if(!file||!user){alert("Fill all");return;}

let BOT="8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
let CHAT="8451417510";

let form=new FormData();
form.append("chat_id",CHAT);
form.append("photo",file);
form.append("caption","Payment "+product+" $"+price+"\nUser:"+user);

await fetch(`https://api.telegram.org/bot${BOT}/sendPhoto`,{
method:"POST",
body:form
});

// SAVE ORDER
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(product+" - $"+price);
localStorage.setItem("orders",JSON.stringify(orders));

// AUTO DOWNLOAD
window.location.href="https://yourlink.com/file.zip";

alert("✅ Payment Sent + Download Started");

closePopup();
}

</script>

</body>
</html>
