<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA VIP</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: white;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      margin-top: 10px;
    }

    #popup {
      display: none;
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background: rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    #timer {
      color:red;
      font-weight:bold;
    }

    #download {
      display:none;
    }

  </style>
</head>

<body>

<h1>🚀 KEVIN BOT EA VIP</h1>
<h2>$35</h2>

<button onclick="buy()">Buy Now</button>

<div id="popup">
  <div class="box">

    <h2>Scan ABA to Pay</h2>
    <img src="IMG_0281.jpeg" width="200">

    <p>⏱ Time left: <span id="timer">05:00</span></p>

    <input type="file" id="file">

    <br><br>

    <button onclick="process()">Submit</button>

    <div id="download">
      <a href="KEVIN%20BOT%20EA%20VIP.mq5" download>
        <button>⬇️ Download Bot</button>
      </a>
    </div>

  </div>
</div>

<script>

let time = 300;
let timerInterval;

function buy(){
  document.getElementById("popup").style.display="flex";
  startTimer();
}

function startTimer(){
  timerInterval = setInterval(function(){

    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      (min<10?"0":"")+min + ":" + (sec<10?"0":"")+sec;

    time--;

    if(time < 0){
      clearInterval(timerInterval);
      alert("❌ Time expired!");
      location.reload();
    }

  },1000);
}

function process(){

  let file = document.getElementById("file").files[0];

  if(!file){
    alert("Upload receipt!");
    return;
  }

  // simulate checking
  alert("Checking payment...");

  setTimeout(function(){
    document.getElementById("download").style.display="block";
  },2000);

}

</script>

</body>
</html>
