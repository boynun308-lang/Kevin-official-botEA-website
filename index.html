<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA VIP</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: white;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      margin-top: 10px;
    }

    #popup {
      display: none;
      position: fixed;
      top:0;left:0;
      width:100%;height:100%;
      background: rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .loading {
      display:none;
      color: green;
      font-weight: bold;
    }

    #download {
      display:none;
    }
  </style>
</head>

<body>

<h1>🚀 KEVIN BOT EA VIP</h1>
<h2>$50</h2>

<button onclick="buy()">Buy Now</button>

<div id="popup">
  <div class="box">

    <h2>Scan ABA</h2>
    <img src="IMG_0281.jpeg" width="200">

    <p>Upload receipt</p>

    <input type="file" id="file">

    <br><br>

    <button onclick="process()">Submit</button>

    <p class="loading" id="loading">⏳ Checking payment...</p>

    <div id="download">
      <a href="KEVIN%20BOT%20EA%20VIP.mq5" download>
        <button>⬇️ Download Bot</button>
      </a>
    </div>

  </div>
</div>

<script>

function buy(){
  document.getElementById("popup").style.display="flex";
}

function process(){

  let file = document.getElementById("file").files[0];

  if(!file){
    alert("Upload receipt first!");
    return;
  }

  document.getElementById("loading").style.display="block";

  setTimeout(function(){
    document.getElementById("loading").innerText="✅ Payment Verified!";
    document.getElementById("download").style.display="block";
  }, 3000);

}

</script>

</body>
</html>
