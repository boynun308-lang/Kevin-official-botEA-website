<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA Store</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
}

header{
  background:#2563eb;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.title{
  font-weight:bold;
  font-size:16px;
}

.price{
  color:#2563eb;
  font-size:18px;
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  color:gray;
  margin-left:5px;
}

.badge{
  display:inline-block;
  background:#dcfce7;
  color:#15803d;
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
  margin-top:5px;
}

.btn{
  margin-top:10px;
  display:block;
  background:#2563eb;
  color:white;
  text-align:center;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

.popup-box img{
  width:200px;
}

</style>
</head>

<body>

<header>🚀 Kevin Bot EA Store</header>

<div class="container">

<!-- VIP -->
<div class="card">
  <img src="vip.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA VIP</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" onclick="buy()" class="btn">Buy Now</a>
  </div>
</div>

<!-- Scalping -->
<div class="card">
  <img src="scalping.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA Pro Scalping</div>
    <div class="price">$45 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" onclick="buy()" class="btn">Buy Now</a>
  </div>
</div>

<!-- Auto -->
<div class="card">
  <img src="auto.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot Trading Auto VIP</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" onclick="buy()" class="btn">Buy Now</a>
  </div>
</div>

<!-- Official -->
<div class="card">
  <img src="official.jpg.png">
  <div class="content">
    <div class="title">Kevin Official Bot EA</div>
    <div class="price">$35 <span class="old">$50</span></div>
    <div class="badge">✔ In Stock ⚡ Instant</div>
    <a href="#" onclick="buy()" class="btn">Buy Now</a>
  </div>
</div>

</div>

<!-- POPUP -->
<div id="popup" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
">

  <div style="
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
  ">

    <h2>💰 Pay $35</h2>

    <img src="qr.png" style="width:200px; margin:10px 0;">

    <input type="file" id="file"><br><br>

    <button onclick="confirmPay()" style="
    background:#2563eb;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    ">
      Submit
    </button>

    <br><br>
    <button onclick="closePopup()">❌ Close</button>

  </div>
</div>
<script>
async function confirmPay(){

  let file = document.getElementById("file").files[0];

  if(!file){
    alert("❌ Upload receipt first");
    return;
  }

  let BOT_TOKEN = "8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
  let CHAT_ID = "8451417510";

  let formData = new FormData();
  formData.append("chat_id", CHAT_ID);
  formData.append("photo", file);
  formData.append("caption", "💰 New Payment Receipt ($35)");

  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
    method: "POST",
    body: formData
  });

  alert("✅ Sent to admin! Wait for approval.");

}
</script>
</body>
</html>
