<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA Store</title>
<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;
}

header{
  background:linear-gradient(90deg,#2563eb,#1e40af);
  color:white;
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* HOT BADGE */
.hot{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* CONTENT */
.content{
  padding:12px;
}

.title{
  font-weight:bold;
  font-size:15px;
  margin-bottom:5px;
}

.price{
  color:#2563eb;
  font-size:18px;
  font-weight:bold;
}

/* BUTTON */
.btn{
  margin-top:10px;
  display:block;
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:white;
  text-align:center;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  background:linear-gradient(90deg,#1d4ed8,#1e40af);
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:320px;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}

.popup-box img{
  width:220px;
  border-radius:10px;
}

input{
  padding:10px;
  width:90%;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>
<body>
<header>🚀 Kevin Bot EA Store</header>
<div class="container">
<div class="card">
  <div class="hot">🔥 HOT</div>
  <img src="vip.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA VIP</div>
    <div class="price">$35</div>
    <a href="#" onclick="buy(35)" class="btn">Buy Now</a>
  </div>
</div>
<div class="card">
  <div class="hot">🔥 HOT</div>
  <img src="scalping.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot EA Pro Scalping</div>
    <div class="price">$45</div>
    <a href="#" onclick="buy(45)" class="btn">Buy Now</a>
  </div>
</div>
<div class="card">
  <img src="auto.jpg.png">
  <div class="content">
    <div class="title">Kevin Bot Trading Auto VIP</div>
    <div class="price">$35</div>
    <a href="#" onclick="buy(35)" class="btn">Buy Now</a>
  </div>
</div>
<div class="card">
  <img src="official.jpg.png">
  <div class="content">
    <div class="title">Kevin Official Bot EA</div>
    <div class="price">$35</div>
    <a href="#" onclick="buy(35)" class="btn">Buy Now</a>
  </div>
</div>
</div>
<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
<h2 id="priceText">💰 Pay $35</h2>

<img src="qr.png.jpeg">

<p>Scan & Pay with ABA</p>

<input type="text" id="username" placeholder="Telegram username (@username)">
<input type="file" id="file"><br><br>

<button onclick="confirmPay()" class="btn">Submit</button><br><br>

<button onclick="closePopup()">❌ Close</button>
  </div>
</div>
<script>
let currentPrice = 35;

function buy(price){
  currentPrice = price;
  document.getElementById("priceText").innerText = "💰 Pay $" + price;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

async function confirmPay(){

  let file = document.getElementById("file").files[0];
  let username = document.getElementById("username").value;

  if(!file){
    alert("❌ Upload receipt first");
    return;
  }

  if(!username){
    alert("❌ Enter Telegram username");
    return;
  }

  let BOT_TOKEN = "8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
  let ADMIN_ID = "8451417510";

  let formData = new FormData();
  formData.append("chat_id", ADMIN_ID);
  formData.append("photo", file);
  formData.append("caption", "💰 Payment $" + currentPrice + "\nUser: " + username);

  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
    method: "POST",
    body: formData
  });

  await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: username.replace("@",""),
      text: "✅ Payment received!\nDownload EA:\nhttps://yourlink.com/file.zip"
    })
  });

  alert("✅ Done! Check Telegram");

  closePopup();
}
</script>
</body>
</html>
:::
