<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Premium Store</title>
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f6fb;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
  border-bottom:1px solid #ddd;
}

.logo{
  font-weight:bold;
  color:#2563eb;
}

.wallet{
  background:#eef2ff;
  padding:8px 15px;
  border-radius:12px;
}

/* BANNER */
.banner{
  background:#2563eb;
  color:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:10px;
  padding:0 15px;
  overflow:auto;
}

.cat{
  background:white;
  padding:8px 15px;
  border-radius:20px;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
  font-size:14px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.2s;
  position:relative;
}

.card:hover{
  transform:scale(1.03);
}

.hot{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.title{
  font-weight:bold;
}

.price{
  color:#2563eb;
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  color:gray;
  font-size:12px;
}

.btn{
  display:block;
  margin-top:10px;
  background:#2563eb;
  color:white;
  text-align:center;
  padding:10px;
  border-radius:12px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

input{
  width:90%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>
<body>
<header>
<div class="logo">🚀 Kevin Premium</div>
<div class="wallet">$0.00</div>
</header>
<div class="banner">
<h2>Welcome to Kevin Store</h2>
<p>Best EA Trading Bots 🔥</p>
</div>
<div class="categories">
<div class="cat">All</div>
<div class="cat">Scalping</div>
<div class="cat">Auto</div>
<div class="cat">VIP</div>
</div>
<div class="container">
<div class="card">
<div class="hot">HOT</div>
<img src="vip.jpg.png">
<div class="content">
<div class="title">VIP Bot</div>
<div class="price">$35 <span class="old">$50</span></div>
<a onclick="buy(35)" class="btn">Buy</a>
</div>
</div>
<div class="card">
<div class="hot">HOT</div>
<img src="scalping.jpg.png">
<div class="content">
<div class="title">Scalping Pro</div>
<div class="price">$45 <span class="old">$60</span></div>
<a onclick="buy(45)" class="btn">Buy</a>
</div>
</div>
</div>
<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3 id="priceText">$35</h3>
<img src="qr.png.jpeg" width="200">
<input id="username" placeholder="Telegram username">
<input type="file" id="file">
</div>
</div>
<script>

let price=35;

function buy(p){
price=p;
document.getElementById("priceText").innerText="$"+p;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

async function confirmPay(){

let file=document.getElementById("file").files[0];
let user=document.getElementById("username").value;

if(!file||!user){alert("Fill all");return;}

let BOT="8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
let CHAT="8451417510";

let form=new FormData();
form.append("chat_id",CHAT);
form.append("photo",file);
form.append("caption","Payment $"+price+"\nUser:"+user);

await fetch(`https://api.telegram.org/bot${BOT}/sendPhoto`,{
method:"POST",
body:form
});

alert("Done!");
closePopup();
}

</script>
</body>
</html>
:::
