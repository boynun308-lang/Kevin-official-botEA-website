<!DOCTYPE html>
<html>
<head>
  <title>Kevin Bot EA Store</title>

  <style>
    body {
      background: white;
      font-family: Arial;
      margin: 0;
    }

    header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
    }

    h1 {
      text-align: center;
      margin: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #007bff;
      font-size: 18px;
      margin: 5px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      margin-top: 10px;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    .box img {
      width:200px;
    }

    .telegram {
      background:#0088cc;
    }

    .close {
      background:red;
    }

  </style>
</head>

<body>

<header>🚀 Kevin Bot EA Store</header>

<h1>Premium EA Bots</h1>

<div class="grid">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="IMG_0281.jpeg">
    <h3>KEVIN BOT EA VIP</h3>
    <div class="price">$50</div>

    <button onclick="buy('KEVIN BOT EA VIP',50)">
      Buy Now
    </button>
  </div>

</div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <h2>Scan ABA to Pay</h2>

    <img src="IMG_0281.jpeg">

    <p>After payment, send screenshot</p>

    <button class="telegram" onclick="sendTelegram()">📩 Send Proof</button>

    <br><br>

    <button class="close" onclick="closePop()">Close</button>
  </div>
</div>

<script>
let product = "";
let price = 0;

function buy(name, p){
  product = name;
  price = p;

  document.getElementById("popup").style.display = "flex";
}

function closePop(){
  document.getElementById("popup").style.display = "none";
}

function sendTelegram(){

  let text = "Hello, I paid $" + price + " for " + product;

  let username = "kevinofficialbotea"; // 👉 ប្ដូរនេះ

  let url = "https://t.me/" + username + https://t.me/kevinofficialbotea"?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}
</script>

</body>
</html>
