<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA</title>

<style>
body{font-family:Arial;margin:0;background:#f5f7fb}

/* LOGIN */
#loginBox{
height:100vh;display:flex;justify-content:center;align-items:center;
}
.login{
background:white;padding:25px;border-radius:15px;width:300px;text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd}
button{padding:10px;margin-top:10px;width:100%;background:#2563eb;color:white;border:none;border-radius:10px}

/* APP */
#app{display:none}

header{
background:#2563eb;color:white;text-align:center;padding:15px;font-size:20px
}

/* MENU */
.menu-btn{
position:fixed;top:15px;left:15px;background:#2563eb;color:white;
border:none;padding:10px;border-radius:10px;z-index:999;
}

#menu{
position:fixed;top:0;left:-270px;width:270px;height:100%;
background:white;box-shadow:5px 0 20px rgba(0,0,0,0.2);
transition:0.3s;z-index:999;
}

.profile{
background:#2563eb;color:white;padding:20px;text-align:center
}

.menu-item{padding:12px;cursor:pointer}
.menu-item:hover{background:#f1f5f9}

/* STORE */
.container{padding:15px}
.card{
background:white;border-radius:15px;margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);overflow:hidden;
}
.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:10px}
.btn{display:block;background:#2563eb;color:white;padding:10px;text-align:center;border-radius:10px;margin-top:10px}

/* POPUP */
#popup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);justify-content:center;align-items:center;
}
.popup-box{
background:white;padding:20px;border-radius:15px;text-align:center;width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login">
<h2>🔐 Login</h2>
<input type="email" id="email" placeholder="Gmail">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app">

<button class="menu-btn" onclick="openMenu()">☰</button>

<!-- MENU -->
<div id="menu">
<div class="profile">
<h3 id="userEmail">User</h3>
</div>

<div class="menu-item">📦 Browse Products</div>
<div class="menu-item">📜 Order History</div>
<div class="menu-item">👤 Account</div>
<div class="menu-item">💰 Add Balance</div>
<div class="menu-item">⚙️ Dashboard</div>
<div class="menu-item" onclick="logout()">🚪 Logout</div>
</div>

<header>🚀 Kevin Bot EA Store</header>

<div class="container">

<div class="card">
<img src="vip.jpg.png">
<div class="card-body">
<h3>Kevin Bot EA VIP</h3>
<p>$35</p>
<a class="btn" onclick="buy(35)">Buy Now</a>
</div>
</div>

<div class="card">
<img src="scalping.jpg.png">
<div class="card-body">
<h3>Pro Scalping</h3>
<p>$45</p>
<a class="btn" onclick="buy(45)">Buy Now</a>
</div>
</div>

<div class="card">
<img src="auto.jpg.png">
<div class="card-body">
<h3>Auto VIP</h3>
<p>$35</p>
<a class="btn" onclick="buy(35)">Buy Now</a>
</div>
</div>

<div class="card">
<img src="official.jpg.png">
<div class="card-body">
<h3>Official Bot</h3>
<p>$35</p>
<a class="btn" onclick="buy(35)">Buy Now</a>
</div>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2 id="priceText">💰 Pay $35</h2>

<img src="qr.png.jpeg" width="200">

<p>Scan & Pay ABA</p>

<input type="text" id="username" placeholder="@telegram">

<input type="file" id="file"><br><br>

<button onclick="confirmPay()">Submit</button><br><br>

<button onclick="closePopup()">Close</button>
</div>
</div>

<script>
function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(email && pass){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userEmail").innerText=email;
}else{
alert("Enter info");
}
}

function logout(){
location.reload();
}

function openMenu(){
document.getElementById("menu").style.left="0";
}

let currentPrice=35;

function buy(price){
currentPrice=price;
document.getElementById("priceText").innerText="💰 Pay $"+price;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

async function confirmPay(){
let file=document.getElementById("file").files[0];
let username=document.getElementById("username").value;

if(!file){alert("Upload receipt");return;}
if(!username){alert("Enter Telegram");return;}

let BOT_TOKEN="YOUR_BOT_TOKEN";
let ADMIN_ID="YOUR_CHAT_ID";

let formData=new FormData();
formData.append("chat_id",ADMIN_ID);
formData.append("photo",file);
formData.append("caption","Payment $"+currentPrice+" User:"+username);

await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
method:"POST",
body:formData
});

alert("Sent to admin");
closePopup();
}
</script>

</body>
</html>
