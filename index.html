<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kevin EA Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:white;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e73ff;
  color:white;
}

.popup{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.timer{
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
  <b>🚀 Kevin EA Store</b>
</div>

<div class="container">

  <div class="card">
    <h2>Kevin Bot EA VIP</h2>
    <h1>$35</h1>

    <button class="btn" onclick="buy()">Buy Now</button>

    <button id="downloadBtn" class="btn" style="background:green;display:none;" onclick="download()">
      Download EA
    </button>

  </div>

</div>

<!-- PAYMENT POPUP -->
<div class="popup" id="popup">
  <div class="box">

    <h2 style="background:red;color:white;padding:10px;border-radius:10px;">KHQR</h2>

    <h3>$35 USD</h3>

    <img src="IMG_0281.jpeg" width="200"><br><br>

    <div class="timer" id="timer">05:00</div>

    <input type="file" id="receipt"><br>

    <button class="btn" onclick="submitPayment()">Submit Receipt</button>
    <button class="btn" style="background:gray;" onclick="closePop()">Cancel</button>

  </div>
</div>

<script>
let time = 300;

function buy(){
  document.getElementById("popup").style.display="flex";
  startTimer();
}

function closePop(){
  document.getElementById("popup").style.display="none";
}

function startTimer(){
  let t = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

    time--;

    if(time<0){
      clearInterval(t);
      alert("❌ Time expired");
      location.reload();
    }
  },1000);
}

function submitPayment(){
  let file = document.getElementById("receipt").files[0];

  if(!file){
    alert("Upload receipt first!");
    return;
  }

  alert("✅ Payment submitted!");

  document.getElementById("popup").style.display="none";
  document.getElementById("downloadBtn").style.display="block";
}

function download(){
  window.open("EA.mq5"); // 👉 put your file here
}
</script>

</body>
</html>
