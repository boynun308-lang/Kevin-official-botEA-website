<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kevin Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:white;
  border-bottom:2px solid #eee;
}

.logo{
  font-weight:bold;
  color:#1e73ff;
}

.balance{
  border:2px solid #1e73ff;
  padding:5px 10px;
  border-radius:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.price{
  color:#1e73ff;
  font-weight:bold;
}

.stock{
  color:green;
  font-size:12px;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e73ff;
  color:white;
  margin-top:10px;
}

/* LOGIN */
.login{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:80%;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

/* KHQR */
.popup{
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:flex-end;
}

.popup-box{
  background:white;
  width:100%;
  border-radius:20px 20px 0 0;
  padding:20px;
  text-align:center;
}

.timer{
  color:red;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn" onclick="enter()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="header">
  <div class="logo">S</div>
  <div class="balance">$0.00</div>
</div>

<div class="container">

  <div class="card">
    <img src="IMG_0281.jpeg">
    <div class="card-body">
      <b>EA VIP</b><br>
      <span class="price">$35</span><br>
      <span class="stock">✔ In Stock</span>
      <button class="btn" onclick="buy()">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="IMG_0281.jpeg">
    <div class="card-body">
      <b>EA Pro</b><br>
      <span class="price">$50</span><br>
      <span class="stock">✔ In Stock</span>
      <button class="btn" onclick="buy()">Buy Now</button>
    </div>
  </div>

</div>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">
  <div class="box">
    <h2>Hello Yuthyuki</h2>
    Balance: $0.00
  </div>
</div>

<!-- KHQR -->
<div class="popup" id="pay">
  <div class="popup-box">

    <div style="background:red;color:white;padding:10px;border-radius:10px;">
      KHQR
    </div>

    <h3>Kevin EA</h3>
    <h2>$35 USD</h2>

    <img src="IMG_0281.jpeg" width="200">

    <div class="timer" id="timer">05:00</div>

    <button class="btn" onclick="openBot()">I Paid</button>
    <button class="btn" style="background:gray;" onclick="closePay()">Cancel</button>

  </div>
</div>

<script>
let time = 300;

function enter(){
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

function buy(){
  document.getElementById("pay").style.display="flex";
  startTimer();
}

function closePay(){
  document.getElementById("pay").style.display="none";
}

function startTimer(){
  let t = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

    time--;

    if(time<0){
      clearInterval(t);
      alert("Time expired");
      location.reload();
    }
  },1000);
}

function openBot(){
  window.open("https://@kevin_bot_ea_bot","_blank");
}
</script>

</body>
</html>
