<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Elite EA</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HERO */
.hero{
  padding:40px 20px;
  text-align:center;
}

.hero h1{
  font-size:28px;
}

.hero p{
  color:#94a3b8;
}

.cta{
  margin-top:20px;
  display:inline-block;
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  padding:12px 25px;
  border-radius:30px;
  font-weight:bold;
}

/* GRID */
.container{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.content{
  padding:12px;
}

.title{
  font-weight:bold;
}

.price{
  color:#60a5fa;
  font-size:16px;
}

.old{
  text-decoration:line-through;
  color:#94a3b8;
  font-size:12px;
}

.btn{
  display:block;
  margin-top:10px;
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  padding:10px;
  text-align:center;
  border-radius:12px;
  font-weight:bold;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>🚀 Kevin Elite Trading Bots</h1>
<p>Professional EA Systems For Real Profit</p>
<div class="cta">🔥 Premium Signals + Automation</div>
</div>

<!-- STORE -->
<div class="container">

<div class="card">
<img src="vip.jpg.png">
<div class="content">
<div class="title">VIP EA Bot</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'VIP')">Buy Now</div>
</div>
</div>

<div class="card">
<img src="scalping.jpg.png">
<div class="content">
<div class="title">Scalping Pro</div>
<div class="price">$45 <span class="old">$60</span></div>
<div class="btn" onclick="buy(45,'Scalping')">Buy Now</div>
</div>
</div>

<div class="card">
<img src="auto.jpg.png">
<div class="content">
<div class="title">Auto Trading</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'Auto')">Buy Now</div>
</div>
</div>

<div class="card">
<img src="official.jpg.png">
<div class="content">
<div class="title">Official EA</div>
<div class="price">$35 <span class="old">$50</span></div>
<div class="btn" onclick="buy(35,'Official')">Buy Now</div>
</div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup">

<h3 id="priceText"></h3>

<img src="qr.png.jpeg" width="200">

<input id="username" placeholder="Telegram username">
<input type="file" id="file">

<br><br>

<button onclick="confirmPay()">Submit</button>

</div>
</div>

<script>

let price=0;
let product="";

function buy(p,name){
price=p;
product=name;
document.getElementById("priceText").innerText=name+" - $"+p;
document.getElementById("popup").style.display="flex";
}

async function confirmPay(){

let file=document.getElementById("file").files[0];
let user=document.getElementById("username").value;

if(!file||!user){alert("Fill all");return;}

let BOT="8355272068:AAFY6kKYYkbZgK9KP_e0_HwO-IhBCCNtzOo";
let CHAT="8451417510";

let form=new FormData();
form.append("chat_id",CHAT);
form.append("photo",file);
form.append("caption","💰 "+product+" $"+price+"\nUser:"+user);

await fetch(`https://api.telegram.org/bot${BOT}/sendPhoto`,{
method:"POST",
body:form
});

// DOWNLOAD
window.location.href="https://yourlink.com/file.zip";

alert("✅ Payment Sent + Download Started");

}

</script>

</body>
</html>
