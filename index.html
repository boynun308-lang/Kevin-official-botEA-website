<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Bot EA Store</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
}

/* HEADER */
.header{
  background:#1e5eff;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{
  width:100%;
}

.card-body{
  padding:10px;
}

.price{
  color:#1e5eff;
  font-size:18px;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e5eff;
  color:white;
  margin-top:10px;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  border-radius:15px;
  padding:20px;
  text-align:center;
  width:300px;
}

.popup-box img{
  width:200px;
}

/* DOWNLOAD */
.download{
  display:none;
  margin-top:10px;
  background:green;
}

.timer{
  color:red;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
🚀 Kevin Bot EA Store
</div>

<div class="container">

<!-- VIP -->
<div class="card">
  <img src="vip.jpg">
  <div class="card-body">
    <h3>Kevin Bot EA VIP</h3>
    <div class="price">$35</div>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>
</div>

<!-- SCALPING -->
<div class="card">
  <img src="scalping.jpg">
  <div class="card-body">
    <h3>Kevin Bot EA Pro Scalping</h3>
    <div class="price">$35</div>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>
</div>

<!-- AUTO -->
<div class="card">
  <img src="auto.jpg">
  <div class="card-body">
    <h3>Kevin Bot Trading Auto VIP</h3>
    <div class="price">$35</div>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>
</div>

<!-- OFFICIAL -->
<div class="card">
  <img src="official.jpg">
  <div class="card-body">
    <h3>Kevin Official Bot EA</h3>
    <div class="price">$35</div>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>
</div>

</div>
