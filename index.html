<script>

let time = 300;

  document.getElementById("popup").style.display="flex";

function startTimer(){
  let timer = setInterval(()=>{
    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      (min<10?"0":"")+min+":"+(sec<10?"0":"")+sec;

    time--;

    if(time < 0){
      clearInterval(timer);
      alert("❌ Time expired!");

}
