<!DOCTYPE html>
<html>
<head>
<title>Kevin Bot EA Store</title>

<style>
body{
  font-family: Arial;
  background:#f5f6fa;
  text-align:center;
}

.header{
  background:#0d6efd;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.card{
  background:white;
  margin:40px auto;
  padding:30px;
  width:90%;
  max-width:400px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.price{
  font-size:28px;
  font-weight:bold;
  margin:10px 0;
}

button{
  background:#0d6efd;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:5px;
  font-size:16px;
}

.popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>

</head>

<body>

<div class="header">🚀 Kevin Bot EA Store</div>

<div class="card">
  <h2>KEVIN BOT EA VIP</h2>
  <div class="price">$35</div>
  <button onclick="buy()">Buy Now</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">

    <h3>Scan ABA & Upload Receipt</h3>

    <img src="IMG_0281.jpeg" width="200"><br>

    <p id="timer">05:00</p>

    <form action="https://formspree.io/f/xojyenok"
    method="POST"
    enctype="multipart/form-data"
    onsubmit="setTimeout(openBot,1000)">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="file" name="receipt" required>

      <button type="submit">Submit Payment</button>
    </form>

  </div>
</div>

<script>

let time = 300;

function buy(){
  document.getElementById("popup").style.display="flex";
  startTimer();
}

function startTimer(){
  let timer = setInterval(()=>{
    let min = Math.floor(time/60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
    (min<10?"0":"")+min+":"+(sec<10?"0":"")+sec;

    time--;

    if(time < 0){
      clearInterval(timer);
      alert("❌ Time expired!");
      location.reload();
    }
  },1000);
}

function openBot(){
  window.open("https://t.me/YOUR_BOT_USERNAME?start=buy","_blank");
}

</script>

</body>
</html>
